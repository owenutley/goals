<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>My Goals</title>
    <style>
        :root {
            /* Dark Mode Palette */
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #f8fafc;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.15);
            --blue-bg: rgba(59, 130, 246, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .app-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 550px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .dashboard-sidebar {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .dashboard-main {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .header-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 {
            color: var(--primary);
            font-size: 28px;
            text-align: left;
            letter-spacing: -0.5px;
        }

        .progress-container {
            width: 100%;
            background-color: var(--border);
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--success);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px var(--success);
        }

        .progress-text {
            text-align: right;
            font-size: 13px;
            color: var(--text-muted);
            margin-top: -8px;
            font-weight: 600;
        }

        /* View Toggle */
        .view-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-color);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .view-controls span {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
            padding-left: 8px;
        }

        .view-btn {
            flex: 1;
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 8px 0;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .view-btn.active {
            background: var(--card-bg);
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* Manager Styles */
        .manager-block {
            background: rgba(15, 23, 42, 0.5);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .manager-block h3 {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .pill {
            color: var(--text-main);
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid transparent;
            font-weight: 600;
        }

        .pill span {
            cursor: pointer;
            color: var(--text-main);
            opacity: 0.5;
            font-weight: bold;
        }

        .pill span:hover {
            opacity: 1;
            color: var(--danger);
        }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input[type="text"], input[type="date"], select {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--bg-color);
            border: 2px solid var(--border);
            color: var(--text-main);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
            color-scheme: dark; 
        }

        input[type="text"]:focus, input[type="date"]:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            cursor: pointer;
            background: none;
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid var(--border); border-radius: 10px; }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button.btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button.btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        button.btn.small {
            padding: 12px 20px;
            font-size: 14px;
            width: auto;
        }

        /* Sections and Lists */
        .goal-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .goal-section h2 {
            font-size: 18px;
            color: var(--text-main);
            border-bottom: 2px solid var(--border);
            padding-bottom: 8px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .goal-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .goal-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-radius: 12px;
            transition: all 0.2s;
            border: 2px solid var(--border); /* Default fallback */
            background-color: var(--bg-color); /* Default fallback */
        }

        .goal-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .goal-content {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            flex: 1;
        }

        .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            background: rgba(15, 23, 42, 0.5);
        }

        .goal-item.completed .checkbox {
            background-color: var(--success);
            border-color: var(--success);
        }

        .goal-item.completed .checkbox::after {
            content: "✓";
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .text-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .goal-text {
            font-size: 16px;
            transition: color 0.2s;
            line-height: 1.4;
            font-weight: 500;
        }

        .goal-item.completed .goal-text {
            color: var(--text-muted);
            text-decoration: line-through;
            opacity: 0.6;
        }

        /* Badges */
        .meta-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: fit-content;
        }

        .date-badge {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1px solid transparent;
        }

        .date-badge.valid {
            background: var(--blue-bg);
            color: #60a5fa;
            border-color: rgba(59, 130, 246, 0.3);
        }

        .date-badge.overdue {
            background: var(--danger-bg);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.3);
        }

        .goal-item.completed .badge,
        .goal-item.completed .date-badge {
            opacity: 0.5;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .empty-state {
            color: var(--text-muted);
            padding: 20px 0;
            font-style: italic;
            font-size: 14px;
            text-align: center;
            opacity: 0.7;
        }

        /* --- DESKTOP LAYOUT --- */
        @media (min-width: 900px) {
            body { padding: 40px; align-items: flex-start; }
            .app-container {
                max-width: 1000px; 
                flex-direction: row; 
                align-items: flex-start;
                gap: 50px;
                padding: 40px;
            }
            .dashboard-sidebar { flex: 0 0 340px; position: sticky; top: 40px; }
            .dashboard-main { flex: 1; min-width: 0; }
            h1 { font-size: 32px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="dashboard-sidebar">
            <div class="header-section">
                <h1>Dashboard</h1>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="progress-text" id="progressText">0% Completed</div>
            </div>

            <div class="view-controls">
                <span>Group By:</span>
                <button class="view-btn active" id="btnGroupTime" onclick="setGrouping('timeframe')">Timeframe</button>
                <button class="view-btn" id="btnGroupCat" onclick="setGrouping('category')">Category</button>
            </div>

            <div class="manager-block">
                <h3>Manage Timeframes (Border Color)</h3>
                <div class="input-row">
                    <input type="text" id="newTfInput" placeholder="e.g. Q3, Someday..." style="padding: 10px; font-size: 14px;">
                    <input type="color" id="newTfColor" value="#3b82f6">
                    <button class="btn small" onclick="addTimeframe()">Add</button>
                </div>
                <div id="tfPills" class="pills-container"></div>
            </div>

            <div class="manager-block">
                <h3>Manage Categories (Background Color)</h3>
                <div class="input-row">
                    <input type="text" id="newCatInput" placeholder="e.g. Finance, Health..." style="padding: 10px; font-size: 14px;">
                    <input type="color" id="newCatColor" value="#10b981">
                    <button class="btn small" onclick="addCategory()">Add</button>
                </div>
                <div id="catPills" class="pills-container"></div>
            </div>
            
            <div class="controls">
                <input type="text" id="goalInput" placeholder="Define your next objective...">
                <div class="input-row">
                    <input type="date" id="goalDate" title="Target Completion Date">
                </div>
                <div class="input-row">
                    <select id="timeframeSelect"></select>
                    <select id="categorySelect"></select>
                </div>
                <button class="btn" onclick="addGoal()">Add Target</button>
            </div>
        </div>

        <div class="dashboard-main" id="mainDashboard">
            </div>

    </div>

    <script>
        // State variables
        let goals = [];
        let categories = [];
        let timeframes = [];
        let currentGrouping = 'timeframe'; // 'timeframe' or 'category'

        // Helper function to convert Hex color to RGBA for smooth backgrounds
        function hexToRgba(hex, alpha) {
            // Strip the hash if present
            hex = hex.replace(/^#/, '');
            if (hex.length === 3) {
                hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
            }
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function initApp() {
            // Load custom settings
            const savedCats = localStorage.getItem('myCategoriesObj');
            const savedTfs = localStorage.getItem('myTimeframesObj');
            const savedGroup = localStorage.getItem('myGrouping');
            
            if (savedGroup) currentGrouping = savedGroup;

            if (savedCats) {
                categories = JSON.parse(savedCats);
            } else {
                categories = [{ name: 'General', color: '#64748b' }];
            }

            if (savedTfs) {
                timeframes = JSON.parse(savedTfs);
            } else {
                timeframes = [
                    { name: 'Short Term', color: '#ef4444' },
                    { name: 'Mid Term', color: '#f59e0b' },
                    { name: 'Long Term', color: '#3b82f6' }
                ];
            }

            // Load goals and migrate legacy string data to objects if necessary
            const savedGoals = localStorage.getItem('myPersonalGoals');
            if (savedGoals) {
                let loadedGoals = JSON.parse(savedGoals);
                // Migration: Map old fixed timeframes to new names
                loadedGoals = loadedGoals.map(g => {
                    if (g.timeframe === 'short') g.timeframe = 'Short Term';
                    if (g.timeframe === 'mid') g.timeframe = 'Mid Term';
                    if (g.timeframe === 'long') g.timeframe = 'Long Term';
                    return g;
                });
                goals = loadedGoals;
            }

            setGrouping(currentGrouping, true);
            renderManagers();
            updateProgress();
        }

        // --- CORE SETTINGS LOGIC ---
        function setGrouping(type, initialLoad = false) {
            currentGrouping = type;
            localStorage.setItem('myGrouping', type);
            
            // Update UI buttons
            document.getElementById('btnGroupTime').className = type === 'timeframe' ? 'view-btn active' : 'view-btn';
            document.getElementById('btnGroupCat').className = type === 'category' ? 'view-btn active' : 'view-btn';

            if (!initialLoad) renderDashboard();
        }

        function saveData() {
            localStorage.setItem('myCategoriesObj', JSON.stringify(categories));
            localStorage.setItem('myTimeframesObj', JSON.stringify(timeframes));
            localStorage.setItem('myPersonalGoals', JSON.stringify(goals));
            updateProgress();
        }

        // --- MANAGERS ---
        function addCategory() {
            const input = document.getElementById('newCatInput');
            const colorInput = document.getElementById('newCatColor');
            const name = input.value.trim();
            if (name !== '' && !categories.find(c => c.name === name)) {
                categories.push({ name: name, color: colorInput.value });
                saveData();
                renderManagers();
                renderDashboard();
                input.value = '';
            }
        }

        function deleteCategory(name) {
            categories = categories.filter(c => c.name !== name);
            saveData();
            renderManagers();
            renderDashboard();
        }

        function addTimeframe() {
            const input = document.getElementById('newTfInput');
            const colorInput = document.getElementById('newTfColor');
            const name = input.value.trim();
            if (name !== '' && !timeframes.find(t => t.name === name)) {
                timeframes.push({ name: name, color: colorInput.value });
                saveData();
                renderManagers();
                renderDashboard();
                input.value = '';
            }
        }

        function deleteTimeframe(name) {
            timeframes = timeframes.filter(t => t.name !== name);
            saveData();
            renderManagers();
            renderDashboard();
        }

        function renderManagers() {
            // Render Category Pills
            const catContainer = document.getElementById('catPills');
            catContainer.innerHTML = '';
            const catSelect = document.getElementById('categorySelect');
            catSelect.innerHTML = '<option value="">No Category</option>';
            
            categories.forEach(cat => {
                const pill = document.createElement('div');
                pill.className = 'pill';
                pill.style.backgroundColor = hexToRgba(cat.color, 0.2);
                pill.style.border = `1px solid ${hexToRgba(cat.color, 0.5)}`;
                pill.style.color = cat.color;
                pill.innerHTML = `${cat.name} <span onclick="deleteCategory('${cat.name}')">×</span>`;
                catContainer.appendChild(pill);

                const option = document.createElement('option');
                option.value = cat.name;
                option.innerText = cat.name;
                catSelect.appendChild(option);
            });

            // Render Timeframe Pills
            const tfContainer = document.getElementById('tfPills');
            tfContainer.innerHTML = '';
            const tfSelect = document.getElementById('timeframeSelect');
            tfSelect.innerHTML = '<option value="">No Timeframe</option>';

            timeframes.forEach(tf => {
                const pill = document.createElement('div');
                pill.className = 'pill';
                pill.style.backgroundColor = hexToRgba(tf.color, 0.1);
                pill.style.border = `1px solid ${tf.color}`;
                pill.style.color = tf.color;
                pill.innerHTML = `${tf.name} <span onclick="deleteTimeframe('${tf.name}')">×</span>`;
                tfContainer.appendChild(pill);

                const option = document.createElement('option');
                option.value = tf.name;
                option.innerText = tf.name;
                tfSelect.appendChild(option);
            });
        }

        // --- GOAL LOGIC ---
        function updateProgress() {
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            if (goals.length === 0) {
                progressBar.style.width = '0%';
                progressText.innerText = '0% Completed';
                return;
            }
            const completedGoals = goals.filter(g => g.completed).length;
            const percentage = Math.round((completedGoals / goals.length) * 100);
            progressBar.style.width = `${percentage}%`;
            progressText.innerText = `${percentage}% Completed`;
        }

        function addGoal() {
            const input = document.getElementById('goalInput');
            const catSelect = document.getElementById('categorySelect');
            const tfSelect = document.getElementById('timeframeSelect');
            const dateInput = document.getElementById('goalDate');
            
            const text = input.value.trim();
            if (text !== '') {
                const newGoal = {
                    id: Date.now(),
                    text: text,
                    category: catSelect.value || null,
                    timeframe: tfSelect.value || null,
                    dueDate: dateInput.value,
                    completed: false
                };
                
                goals.unshift(newGoal);
                saveData();
                renderDashboard();
                
                input.value = ''; 
                dateInput.value = '';
            }
        }

        function toggleGoal(id) {
            goals = goals.map(goal => {
                if (goal.id === id) return { ...goal, completed: !goal.completed };
                return goal;
            });
            saveData();
            renderDashboard();
        }

        function deleteGoal(id) {
            goals = goals.filter(goal => goal.id !== id);
            saveData();
            renderDashboard();
        }

        // --- DYNAMIC DASHBOARD RENDERING ---
        function renderDashboard() {
            const dashboard = document.getElementById('mainDashboard');
            dashboard.innerHTML = '';
            
            // Determine our grouping array and key
            const groups = currentGrouping === 'timeframe' ? timeframes : categories;
            const groupKey = currentGrouping === 'timeframe' ? 'timeframe' : 'category';
            const todayStr = new Date().toISOString().split('T')[0];

            // Render each dynamic section
            groups.forEach(group => {
                // Filter goals that match this group
                const sectionGoals = goals.filter(g => g[groupKey] === group.name);
                
                // Create the section HTML wrapper
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'goal-section';
                
                const heading = document.createElement('h2');
                heading.innerHTML = `<span class="color-dot" style="background-color: ${group.color}"></span> ${group.name}`;
                sectionDiv.appendChild(heading);

                const ul = document.createElement('ul');
                ul.className = 'goal-list';

                if (sectionGoals.length === 0) {
                    ul.innerHTML = `<div class="empty-state">No targets mapped to ${group.name}.</div>`;
                } else {
                    sectionGoals.forEach(goal => {
                        const li = document.createElement('li');
                        li.className = `goal-item ${goal.completed ? 'completed' : ''}`;
                        
                        // Find the styles for this specific goal
                        const catObj = categories.find(c => c.name === goal.category);
                        const tfObj = timeframes.find(t => t.name === goal.timeframe);
                        
                        // Apply Dynamic Styles based on the prompt instructions
                        const borderColor = tfObj ? tfObj.color : 'var(--border)';
                        const bgColor = catObj ? hexToRgba(catObj.color, 0.15) : 'var(--bg-color)';
                        
                        li.style.borderColor = borderColor;
                        li.style.backgroundColor = bgColor;
                        
                        // Build Badges
                        let badgesHtml = '';
                        if (currentGrouping === 'timeframe' && catObj) {
                            badgesHtml += `<span class="badge" style="background:${hexToRgba(catObj.color, 0.2)}; color:${catObj.color}">${catObj.name}</span>`;
                        } else if (currentGrouping === 'category' && tfObj) {
                            badgesHtml += `<span class="badge" style="background:${hexToRgba(tfObj.color, 0.2)}; color:${tfObj.color}">${tfObj.name}</span>`;
                        }

                        if (goal.dueDate) {
                            const isOverdue = goal.dueDate < todayStr;
                            const dateClass = isOverdue ? 'overdue' : 'valid';
                            const icon = isOverdue ? '⚠️' : '🎯';
                            const dateObj = new Date(goal.dueDate + 'T12:00:00');
                            const prettyDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                            badgesHtml += `<span class="date-badge ${dateClass}">${icon} ${prettyDate}</span>`;
                        }

                        li.innerHTML = `
                            <div class="goal-content" onclick="toggleGoal(${goal.id})">
                                <div class="checkbox"></div>
                                <div class="text-container">
                                    <span class="goal-text">${goal.text}</span>
                                    <div class="meta-tags">${badgesHtml}</div>
                                </div>
                            </div>
                            <button class="delete-btn" onclick="deleteGoal(${goal.id})">×</button>
                        `;
                        ul.appendChild(li);
                    });
                }
                sectionDiv.appendChild(ul);
                dashboard.appendChild(sectionDiv);
            });

            // Catch-all section for "Unassigned" goals
            const unassignedGoals = goals.filter(g => !groups.find(group => group.name === g[groupKey]));
            if (unassignedGoals.length > 0) {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'goal-section';
                sectionDiv.innerHTML = `<h2><span class="color-dot" style="background-color: var(--text-muted)"></span> Unassigned</h2>`;
                const ul = document.createElement('ul');
                ul.className = 'goal-list';
                
                unassignedGoals.forEach(goal => {
                    const li = document.createElement('li');
                    li.className = `goal-item ${goal.completed ? 'completed' : ''}`;
                    li.innerHTML = `
                        <div class="goal-content" onclick="toggleGoal(${goal.id})">
                            <div class="checkbox"></div>
                            <span class="goal-text">${goal.text}</span>
                        </div>
                        <button class="delete-btn" onclick="deleteGoal(${goal.id})">×</button>
                    `;
                    ul.appendChild(li);
                });
                sectionDiv.appendChild(ul);
                dashboard.appendChild(sectionDiv);
            }
        }

        // Boot
        initApp();
    </script>
</body>
